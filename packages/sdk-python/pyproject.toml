[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "iii-sandbox"
version = "0.1.0"
description = "Python SDK for iii-sandbox - Docker sandbox engine for AI agents"
readme = {text = "Python SDK for iii-sandbox", content-type = "text/plain"}
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
]

[tool.hatch.build.targets.wheel]
packages = ["src/iii_sandbox"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
