[package]
name = "iii-sandbox"
version = "0.1.0"
edition = "2021"
description = "Rust SDK for iii-sandbox"
license = "MIT"

[dependencies]
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
thiserror = "2"
futures-core = "0.3"
futures-util = "0.3"
async-stream = "0.3"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
mockito = "1"
