name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  rust-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/worker
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/worker
      - run: cargo check
      - run: cargo test
      - run: cargo clippy -- -D warnings

  guest-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
          components: clippy
      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/guest-agent
      - name: Check
        run: cargo check --manifest-path packages/guest-agent/Cargo.toml
      - name: Test
        run: cargo test --manifest-path packages/guest-agent/Cargo.toml
      - name: Clippy
        run: cargo clippy --manifest-path packages/guest-agent/Cargo.toml -- -D warnings
      - name: Build (x86_64-unknown-linux-musl)
        run: cargo build --release --target x86_64-unknown-linux-musl --manifest-path packages/guest-agent/Cargo.toml
      - name: Verify static binary
        run: |
          FILE_OUTPUT=$(file packages/guest-agent/target/x86_64-unknown-linux-musl/release/iii-guest-agent)
          echo "$FILE_OUTPUT"
          echo "$FILE_OUTPUT" | grep -qE "static(ally|-pie) linked"
      - uses: actions/upload-artifact@v4
        with:
          name: iii-guest-agent-x86_64
          path: packages/guest-agent/target/x86_64-unknown-linux-musl/release/iii-guest-agent

  # Disabled: requires running iii-engine + Docker. Enable once CI infra supports it.
  integration-test:
    runs-on: ubuntu-latest
    if: false
    needs: [rust-check]
    defaults:
      run:
        working-directory: packages/worker
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/worker
      - run: cargo test --tests -- --ignored
        env:
          TEST_BASE_URL: http://localhost:3111
          TEST_AUTH_TOKEN: test-token

  ts-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
