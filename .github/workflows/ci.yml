name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  rust-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/worker
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/worker
      - run: cargo check
      - run: cargo test
      - run: cargo clippy -- -D warnings

  # Disabled: requires running iii-engine + Docker. Enable once CI infra supports it.
  integration-test:
    runs-on: ubuntu-latest
    if: false
    needs: [rust-check]
    defaults:
      run:
        working-directory: packages/worker
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/worker
      - run: cargo test --tests -- --ignored
        env:
          TEST_BASE_URL: http://localhost:3111
          TEST_AUTH_TOKEN: test-token

  ts-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
